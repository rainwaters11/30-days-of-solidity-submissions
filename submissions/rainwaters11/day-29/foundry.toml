[profile.default]
src             = "contracts"
out             = "out"
libs            = ["lib"]
solc_version    = "0.8.26"
via_ir          = true
optimizer       = true
optimizer_runs  = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/",
]

# Skip OZ/Chainlink internal test and formal-verification harnesses.
skip = [
    "lib/openzeppelin-contracts/fv/**",
    "lib/openzeppelin-contracts/test/**",
    "lib/openzeppelin-contracts/scripts/**",
    "lib/openzeppelin-contracts/lib/**",
    "lib/openzeppelin-contracts/contracts/mocks/**",
    "lib/openzeppelin-contracts/contracts/crosschain/**",
    "lib/chainlink-brownie-contracts/contracts/src/v0.8/tests/**",
]
